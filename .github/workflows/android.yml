name: Build Android APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:        # lets you trigger a build manually from the Actions tab

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write        # needed to publish the APK as a release asset
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install web deps
        run: npm install

      - name: Stage web assets (www/)
        run: |
          rm -rf www && mkdir www
          cp -r index.html manifest.json sw.js assets www/

      - name: Capacitor sync (web -> android)
        run: npx cap sync android

      - name: Build debug APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew :app:assembleDebug --no-daemon

      - name: Upload APK (artifact)
        uses: actions/upload-artifact@v4
        with:
          name: wc2026-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error

      - name: Publish APK to "latest" release (permanent download link)
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release delete latest --yes --cleanup-tag 2>/dev/null || true
          gh release create latest android/app/build/outputs/apk/debug/app-debug.apk \
            --title "Latest build" \
            --notes "Auto-built APK. Always newest at /releases/latest/download/app-debug.apk"

      - name: Notify WhatsApp with download link
        env:
          WPHONE: ${{ secrets.WHATSAPP_PHONE }}
          WKEY: ${{ secrets.WHATSAPP_APIKEY }}
        if: ${{ env.WPHONE != '' && env.WKEY != '' }}
        run: |
          LINK="https://github.com/${{ github.repository }}/releases/latest/download/app-debug.apk"
          MSG="WC2026 new build ready ✅ Download APK: $LINK"
          curl -s -G "https://api.callmebot.com/whatsapp.php" \
            --data-urlencode "phone=$WPHONE" \
            --data-urlencode "text=$MSG" \
            --data-urlencode "apikey=$WKEY" || echo "WhatsApp notify failed (non-fatal)"
